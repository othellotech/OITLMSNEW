{% extends 'portal/base.html' %}
{% load static %}

{% block content %}
<div class="login-bg">
    <div class="login-card">
        <div class="logo">
            <img src="{% static 'images/logo.jpeg' %}" alt="OIT Logo" class="logo-img" onerror="this.src='https://via.placeholder.com/100?text=OIT'">
            <h1>📧 Email Sent</h1>
            <p style="color: #666; margin-top: 10px;">Check your email for password reset instructions</p>
        </div>
        
        <div style="background: #e8f5e9; padding: 1.5rem; border-radius: 12px; margin: 1.5rem 0;">
            <p style="color: #2e7d32; margin-bottom: 0;">
                ✅ We've sent you an email with a link to reset your password.
            </p>
        </div>
        
        <p style="color: #888; font-size: 14px; text-align: center;">
            If you don't see the email, check your spam folder or 
            <a href="{% url 'password_reset' %}" style="color: var(--warm-yellow);">try again</a>.
        </p>
        
        <div class="link" style="margin-top: 1.5rem;">
            <a href="{% url 'login' %}">← Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
