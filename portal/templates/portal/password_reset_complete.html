{% extends 'portal/base.html' %}
{% load static %}

{% block content %}
<div class="login-bg">
    <div class="login-card">
        <div class="logo">
            <img src="{% static 'images/logo.jpeg' %}" alt="OIT Logo" class="logo-img" onerror="this.src='https://via.placeholder.com/100?text=OIT'">
            <h1>✅ Password Reset Complete</h1>
            <p style="color: #666; margin-top: 10px;">Your password has been successfully reset</p>
        </div>
        
        <div style="background: #e8f5e9; padding: 1.5rem; border-radius: 12px; margin: 1.5rem 0;">
            <p style="color: #2e7d32; margin-bottom: 0;">
                ✅ Your password has been set. You can now log in with your new password.
            </p>
        </div>
        
        <div style="text-align: center; margin-top: 1.5rem;">
            <a href="{% url 'login' %}" class="btn" style="display: inline-block; text-decoration: none; width: auto; padding: 12px 40px;">🔐 Login Now</a>
        </div>
    </div>
</div>
{% endblock %}
